# fail2ban filter for MAW auth events.
#
# Line format (see src/lib/server/auth/authLog.ts logAuth()):
#   <iso8601> <event> user=<u> ip=<ip> ua="<ua>"
#
# We treat login_fail, pwchange_fail, rate_limited, and ws_origin_reject
# as signals of an attacker probing auth surfaces.

[Definition]

failregex = ^\S+ login_fail user=\S+ ip=<HOST> ua=".*"$
            ^\S+ pwchange_fail user=\S+ ip=<HOST> ua=".*"$
            ^\S+ rate_limited user=\S+ ip=<HOST> ua=".*"$
            ^\S+ ws_origin_reject user=\S+ ip=<HOST> ua=".*"$

ignoreregex =

datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S
