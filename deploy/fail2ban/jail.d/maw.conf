# Install this file to /etc/fail2ban/jail.d/maw.conf alongside the
# filter in /etc/fail2ban/filter.d/maw-auth.conf. MAW writes its auth
# log to `${MAW_DATA_DIR}/auth.log`; symlink or bind-mount that path to
# /var/log/maw/auth.log and then `fail2ban-client reload`.

[maw]
enabled  = true
port     = http,https
filter   = maw-auth
logpath  = /var/log/maw/auth.log
findtime = 600
maxretry = 5
bantime  = 3600
