# Install this file to /etc/fail2ban/jail.d/maw.conf alongside the
# filter in /etc/fail2ban/filter.d/maw-auth.conf. See the README
# `fail2ban (prod)` section for full setup + verification steps.
#
# Two values below MUST match your deployment:
#
#   logpath — point at the literal ${MAW_DATA_DIR}/auth.log path
#             (symlinks are unreliable with pyinotify; use the real
#             path). Example below assumes the systemd service has
#             MAW_DATA_DIR=/var/lib/maw.
#
#   port    — set to the port the attacker actually hits. If MAW is
#             behind a reverse proxy on 80/443 (recommended) with
#             MAW_TRUST_PROXY=1 in MAW's env, keep `http,https`. If
#             you expose the Node process directly on 3000, use 3000.

[maw]
enabled  = true
port     = http,https
filter   = maw-auth
logpath  = /var/lib/maw/auth.log
findtime = 600
maxretry = 5
bantime  = 3600
